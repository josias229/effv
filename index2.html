<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrousel Hero - Église du Festival de la Foi Vivante</title>
    <!-- Bootstrap pour les fonctionnalités responsive seulement -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Polices Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Raleway:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Raleway', sans-serif;
            font-weight: 400;
        }

        .playfair {
            font-family: 'Raleway', serif;
        }

        .hero {
            position: relative;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        .hero-cta {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 2;
        }

        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 50px;
            }

            .hero-content p {
                font-size: 22px;
            }

            .hero-cta {
                flex-direction: column;
                bottom: 20px;
            }
            
            .navbar nav {
                display: none;
            }
            
            .navbar .logo {
                font-size: 12px;
            }
        }

        .carousel {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .slide.active {
            opacity: 1;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.55);
            z-index: 1;
        }

        .navbar {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2;
        }

        .navbar nav {
            display: flex;
            align-items: center;
        }

        .navbar nav a {
            font-family: 'Montserrat', sans-serif;
            margin: 0 10px;
            text-decoration: none;
            color: white;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 5px;
            border-bottom: 2px solid transparent;
            transition: border-bottom 0.3s, color 0.3s;
            white-space: nowrap;
            font-weight: 600;
        }

        .navbar nav a:hover {
            border-bottom: 2px dotted #e30613;
        }

        .donate {
            background: #e30613;
            padding: 10px 18px;
            border-radius: 4px;
            font-weight: 700;
            border-bottom: none !important;
        }

        .donate:hover {
            background: #c20410;
        }

        /* LOGO - Centré verticalement avec le texte */
        .logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 14px;
            line-height: 1.3;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hero-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
            width: 90%;
            /* Le contenu n'est plus masqué */
        }

        .hero-content h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 90px;
            color: #e5cc98; /* Or/Beige Faith Tabernacle */
            margin-bottom: 10px;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.1;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.7);
        }

        .hero-content p {
            font-family: 'Montserrat', sans-serif;
            font-size: 26px;
            color: white;
            font-weight: 600;
            text-shadow: 1px 2px 5px rgba(0, 0, 0, 0.8);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        /* Barre pleine largeur en bas (CTA) */
        .cta-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(20, 0, 0, 0.8); /* Semi-transparent foncé */
            padding: 20px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 2;
            border-top: 3px solid #e30613; /* Ligne rouge distinctive */
        }

        /* BOUTONS DANS LA BARRE CTA */
        .btn {
            font-family: 'Montserrat', sans-serif;
            padding: 14px 32px;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 4px;
            background: #e30613;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            background: #c20410;
            transform: translateY(-2px);
        }

        .nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(139, 0, 0, 0.6); /* Rouge foncé semi-transparent */
            border: none;
            color: white;
            font-size: 36px;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 2;
            transition: background 0.3s;
        }

        .nav:hover {
            background: rgba(227, 6, 19, 0.9);
        }

        .prev {
            left: 0;
        }

        .next {
            right: 0;
        }
        
        /* Masquer les indicateurs de carrousel */
        .carousel-indicators {
            display: none;
        }
        
        /* Style pour le menu mobile */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 3;
        }
        
        @media (max-width: 1200px) {
            .navbar nav a {
                font-size: 11px;
                margin: 0 5px;
            }
        }
        
        @media (max-width: 992px) {
            .navbar nav {
                position: fixed;
                top: 0;
                right: -100%;
                width: 300px;
                height: 100vh;
                background: rgba(0, 0, 0, 0.95);
                flex-direction: column;
                padding: 80px 20px;
                transition: right 0.3s ease;
                z-index: 100;
                display: flex;
                justify-content: flex-start;
            }
            
            .navbar nav.show {
                right: 0;
            }
            
            .navbar nav a {
                margin: 15px 0;
                font-size: 16px;
                display: block;
            }
            
            .mobile-menu-btn {
                display: block;
            }
            
            .nav {
                font-size: 30px;
                padding: 8px 12px;
            }
            
            .hero-content h1 {
                font-size: 60px;
            }
            
            .hero-content p {
                font-size: 24px;
            }
        }
        
        @media (max-width: 768px) {
            .navbar {
                padding: 15px 20px;
            }
            
            .cta-bar {
                flex-direction: column;
                align-items: center;
                gap: 10px;
                padding: 15px 0;
            }
            
            .btn {
                width: 90%;
            }
            
            .logo {
                font-size: 12px;
            }
        }
        
        @media (max-width: 576px) {
            .navbar {
                padding: 15px 20px;
            }
            
            .hero-content h1 {
                font-size: 40px;
            }
            
            .hero-content p {
                font-size: 18px;
            }
            
            .btn {
                padding: 12px 20px;
                font-size: 13px;
            }
            
            .nav {
                font-size: 24px;
                width: 45px;
                height: 45px;
            }
            
            .prev {
                left: 0;
            }
            
            .next {
                right: 0;
            }
            
            .logo {
                gap: 5px;
            }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="carousel">
            <!-- Images du carrousel -->
            <div class="slide active" style="background-image:url('images/Pasteur_Image5.jpg')"></div>
            <div class="slide" style="background-image:url('images/Pasteur_Image3.jpg')"></div>
            <div class="slide" style="background-image:url('images/Pasteur_Image4.jpg')"></div>
            <div class="slide" style="background-image:url('images/Pasteur_Image2.jpg')"></div>
        </div>

        <div class="overlay"></div>

        <header class="navbar">
            <!-- Logo centré avec le nom -->
            <div class="logo">
                <img src="images/EFFV_logo.png" alt="" height="65px" width="auto" style="margin-right: 8px;">
                <div style="line-height: 1.2;">
                    <span style="font-weight: 700; font-size: 16px;">ÉGLISE DU FESTIVAL</span><br>
                    <span style="font-size: 16px; font-weight: 400;">DE LA FOI VIVANTE</span>
                </div>
            </div>
            <button class="mobile-menu-btn">☰</button>
            <nav>
                <a href="index2.html">Accueil</a>
                <a href="apropos.html">À Propos</a>
                <a href="#">Le Mandat</a>
                <a href="#">Médiathèque</a>
                <a href="#">IBFPD</a>
                <a href="#">Famille Chrétienne</a>
                <a href="#">Téléchargements</a>
                <a href="#">Éducation</a>
                <a href="#">Nous Contacter</a>
                <a href="#" class="donate">Faire un Don</a>
            </nav>
        </header>

        <!-- Contenu central du Carrousel -->
        <div class="hero-content">
            <p>BIENVENUE À L'</p>
            <h1>ÉGLISE DU FESTIVAL<br>DE LA FOI VIVANTE</h1>
        </div>
        
        <!-- Barre d'appel à l'action en bas -->
        <div class="cta-bar">
            <button class="btn">Demande de Prière</button>
            <button class="btn">Planifier une Visite</button>
        </div>

        <!-- Flèches de navigation -->
        <button class="nav prev">&#10094;</button>
        <button class="nav next">&#10095;</button>
    </section>

    <script>
        // Gestion du carrousel
        const slides = document.querySelectorAll('.slide');
        let index = 0;
        let slideInterval;

        function showSlide(i) {
            slides.forEach(s => s.classList.remove('active'));
            slides[i].classList.add('active');
        }

        function nextSlide() {
            index = (index + 1) % slides.length;
            showSlide(index);
        }

        function prevSlide() {
            index = (index - 1 + slides.length) % slides.length;
            showSlide(index);
        }

        // Navigation avec les flèches
        document.querySelector('.next').onclick = () => {
            nextSlide();
            resetInterval();
        };

        document.querySelector('.prev').onclick = () => {
            prevSlide();
            resetInterval();
        };

        // Navigation au clavier
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                nextSlide();
                resetInterval();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
                resetInterval();
            }
        });

        // Défilement automatique
        function startInterval() {
            slideInterval = setInterval(nextSlide, 6000);
        }

        function resetInterval() {
            clearInterval(slideInterval);
            startInterval();
        }

        // Pause au survol
        const carousel = document.querySelector('.carousel');
        carousel.addEventListener('mouseenter', () => {
            clearInterval(slideInterval);
        });

        carousel.addEventListener('mouseleave', () => {
            startInterval();
        });

        // Menu mobile
        const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
        const navMenu = document.querySelector('.navbar nav');

        mobileMenuBtn.addEventListener('click', () => {
            navMenu.classList.toggle('show');
            // Changer l'icône du menu
            mobileMenuBtn.textContent = navMenu.classList.contains('show') ? '✕' : '☰';
        });

        // Fermer le menu en cliquant sur un lien
        document.querySelectorAll('.navbar nav a').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('show');
                mobileMenuBtn.textContent = '☰';
            });
        });

        // Fermer le menu en cliquant à l'extérieur
        document.addEventListener('click', (e) => {
            if (!navMenu.contains(e.target) && !mobileMenuBtn.contains(e.target)) {
                navMenu.classList.remove('show');
                mobileMenuBtn.textContent = '☰';
            }
        });

        // Initialisation
        showSlide(0);
        startInterval();
        
        // Ajouter un effet de fondu à l'ouverture de la page
        document.addEventListener('DOMContentLoaded', () => {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s';
            
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 100);
        });
    </script>

</body>
</html>
